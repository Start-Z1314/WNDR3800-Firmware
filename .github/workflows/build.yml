name: Build OpenWrt for WNDR3800

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Enable SSR+ (helloworld) feed
      run: |
        cd openwrt
        # 解除 Lean 源码中对科学上网插件的隐藏屏蔽
        sed -i 's/^#\(.*helloworld\)/\1/' feeds.conf.default
        # 如果默认文件里没有，则强制追加源地址
        if ! grep -q "helloworld" feeds.conf.default; then
          echo "src-git helloworld https://github.com/fw876/helloworld.git" >> feeds.conf.default
        fi

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
        
        # 写入 WNDR3800 的配置
        cat >> .config <<EOF
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_generic=y
        CONFIG_TARGET_ath79_generic_DEVICE_netgear_wndr3800=y
        
        # 修复 WNDR3800 丢失 eth1 / WAN 口无网卡的问题：强制包含 swconfig 交换机驱动和双网卡支持
        CONFIG_PACKAGE_kmod-switch-ar8216=y
        CONFIG_PACKAGE_swconfig=y
        
        # 科学上网 (SSR+)
        CONFIG_PACKAGE_luci-app-ssr-plus=y
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ShadowsocksR_Libev_Client=y
        # 开启 Xray 并强制使用 UPX 压缩，将其体积从 15MB 压缩到 4MB 左右以适配 16MB 闪存
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y
        CONFIG_XRAY_CORE_COMPRESS_UPX=y
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Trojan=y
        
        # QoS 功能 (解决游戏跳Ping)
        CONFIG_PACKAGE_luci-app-sqm=y
        CONFIG_PACKAGE_luci-app-sqm_INCLUDE_Cake=y
        
        # 网络加速 (Turbo ACC) - 解决冲突的完美共存方案
        CONFIG_PACKAGE_luci-app-turboacc=y
        # 强制关闭 Flow Offloading (流量分流)，解决与 SQM 的冲突以及 WAN 口获取 IP 失败的问题
        # CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING is not set
        # 保留 BBR TCP 拥塞控制，提升网络吞吐和降低延迟 (与 SQM 完美兼容)
        CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_BBR_CCA=y
        
        # UPnP
        CONFIG_PACKAGE_luci-app-upnp=y
        
        # 终极性能压榨：开启 ZRAM 内存压缩
        CONFIG_PACKAGE_zram-swap=y
        
        # 预留后路：强制包含 USB 存储和 Extroot 挂载依赖
        # 万一 16MB 闪存长期使用空间不足，可以通过 U 盘直接扩容 (Extroot)
        CONFIG_PACKAGE_kmod-usb-core=y
        CONFIG_PACKAGE_kmod-usb2=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_block-mount=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        
        # ==========================================
        # 安全精简：通过标准配置禁用不需要的默认插件
        # ==========================================
        # 禁用 Samba (网络共享)
        # CONFIG_PACKAGE_luci-app-samba4 is not set
        # CONFIG_PACKAGE_autosamba is not set
        # 禁用 FTP
        # CONFIG_PACKAGE_luci-app-vsftpd is not set
        # 禁用 广告屏蔽 (占用较大内存和空间)
        # CONFIG_PACKAGE_luci-app-adbyby-plus is not set
        # 禁用 解锁网易云
        # CONFIG_PACKAGE_luci-app-unblockmusic is not set
        # 禁用 KMS 激活
        # CONFIG_PACKAGE_luci-app-vlmcsd is not set
        # 禁用 动态域名 DDNS
        # CONFIG_PACKAGE_luci-app-ddns is not set
        # 禁用 流量监控 (减少后台资源消耗)
        # CONFIG_PACKAGE_luci-app-nlbwmon is not set
        # CONFIG_PACKAGE_luci-app-statistics is not set
        # CONFIG_PACKAGE_collectd is not set
        # 禁用 其他非核心默认插件 (极限保命 16MB 闪存，防止编译体积过大或刷机报错)
        # CONFIG_PACKAGE_luci-app-access-control is not set
        # CONFIG_PACKAGE_luci-app-arpbind is not set
        # CONFIG_PACKAGE_luci-app-autoreboot is not set
        # CONFIG_PACKAGE_luci-app-filetransfer is not set
        # CONFIG_PACKAGE_luci-app-ramfree is not set
        # CONFIG_PACKAGE_luci-app-wol is not set
        # CONFIG_PACKAGE_luci-app-zerotier is not set
        # CONFIG_PACKAGE_luci-app-ipsec-vpnd is not set
        # CONFIG_PACKAGE_luci-app-wireguard is not set
        
        # 注意：不再禁用 IPv6 (ipv6helper)。保留基础 IPv6 支持是目前 Lean 源码最稳定的做法。
        EOF
        
        # ==========================================
        # 注入开机自动执行脚本 (uci-defaults)
        # 刷机后首次开机自动应用最优 Wi-Fi 和系统设置，无需手动配置
        # ==========================================
        mkdir -p package/base-files/files/etc/uci-defaults
        cat > package/base-files/files/etc/uci-defaults/99-custom-settings << 'EOF'
        #!/bin/sh
        
        # 1. 优化 WiFi 设置 (国家代码 US 解锁最大功率，并强制开启 Wi-Fi)
        for dev in radio0 radio1; do
            # 解除默认的 Wi-Fi 禁用状态
            uci set wireless.$dev.disabled='0'
            uci set wireless.$dev.country='US'
            band=$(uci get wireless.$dev.band 2>/dev/null)
            if [ "$band" = "2g" ] || [ "$(uci get wireless.$dev.hwmode 2>/dev/null)" = "11g" ]; then
                uci set wireless.$dev.htmode='HT20'
                uci set wireless.$dev.channel='11'
            elif [ "$band" = "5g" ] || [ "$(uci get wireless.$dev.hwmode 2>/dev/null)" = "11a" ]; then
                uci set wireless.$dev.htmode='HT40'
                uci set wireless.$dev.channel='149'
            fi
        done
        
        # 强制 WPA2-PSK AES 加密并预设初始密码 (防止 TKIP 掉速及无法连接)
        for iface in default_radio0 default_radio1; do
            # 解除默认网络接口的禁用状态
            uci set wireless.$iface.disabled='0'
            uci set wireless.$iface.encryption='psk2+ccmp'
            # 预设默认密码为 password，方便刷机后直接手机连接配置
            uci set wireless.$iface.key='password'
        done
        
        # 2. 开启 BBR 拥塞控制与并发优化 (同步 Turbo ACC 面板配置)
        echo "net.core.default_qdisc=fq" >> /etc/sysctl.conf
        echo "net.ipv4.tcp_congestion_control=bbr" >> /etc/sysctl.conf
        echo "net.netfilter.nf_conntrack_max=65535" >> /etc/sysctl.conf
        
        # 确保 Turbo ACC 面板状态正确：开启 BBR，彻底关闭流量分流 (防冲突)
        uci set turboacc.config.bbr_cca='1'
        uci set turboacc.config.sw_flow='0'
        uci set turboacc.config.hw_flow='0'
        uci set turboacc.config.sfe_flow='0'
        uci commit turboacc
        
        # 3. 设置时区为上海
        uci set system.@system[0].timezone='CST-8'
        uci set system.@system[0].zonename='Asia/Shanghai'
        
        # 4. 强制配置 ZRAM 内存压缩 (为 128M 内存分配 64M 压缩交换区)
        uci set system.@system[0].zram_size_mb='64'
        
        # 5. 预设 SQM QoS 最佳算法 (Cake)
        # 注意：WNDR3800 的物理 WAN 口为 eth1 (eth0是LAN)。如果是PPPoE拨号，请在LuCI后台手动改为 pppoe-wan
        uci set sqm.@queue[0]='queue'
        uci set sqm.@queue[0].interface='eth1'
        uci set sqm.@queue[0].qdisc='cake'
        uci set sqm.@queue[0].script='piece_of_cake.qos'
        uci set sqm.@queue[0].linklayer='ethernet'
        uci set sqm.@queue[0].enabled='1'
        
        # 6. 默认开启 UPnP (提升游戏主机/P2P下载连通性)
        uci set upnpd.config.enabled='1'
        
        uci commit
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99-custom-settings
        
        make defconfig

    - name: Download package
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin/targets/*/*/*sysupgrade.bin

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "WNDR3800 精简高性能固件" >> release.txt
        echo "- 包含 SSR+ (科学上网，支持 SSR/Trojan/Xray，Xray已开启UPX极限压缩)" >> release.txt
        echo "- 包含 SQM QoS / EQoS (解决游戏跳Ping)" >> release.txt
        echo "- 包含 Turbo ACC 网络加速 (仅开启 BBR，完美兼容 SQM)" >> release.txt
        echo "- 包含 UPnP" >> release.txt
        echo "- 移除 USB、Samba、FTP 等无用功能，最大化释放内存" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: openwrt/bin/targets/*/*/*sysupgrade.bin
