name: Build WNDR3800 4.14 Firmware (Old Source)

on:
  workflow_dispatch:
  repository_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/openwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        # 使用经过验证的 OpenWrt 编译依赖脚本
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204) dos2unix
        # 显式安装 Python 3 并设置优先级
        sudo -E apt-get -qq install python3 python3-dev python3-distutils
        # 确保 python 命令指向 python3
        sudo update-alternatives --install /usr/bin/python python /usr/bin/python3 1
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH lede
        ln -sf /workdir/lede $GITHUB_WORKSPACE/lede

    - name: Cache build directories
      uses: actions/cache@v4
      with:
        path: |
          /workdir/lede/dl
          /workdir/lede/build_dir
          /workdir/lede/staging_dir
          /workdir/lede/tmp
        key: lede-build-old-${{ github.run_id }}
        restore-keys: |
          lede-build-old-

    - name: Load custom feeds & DIY Part 1
      run: |
        [ -e "$FEEDS_CONF" ] && cp "$FEEDS_CONF" lede/feeds.conf.default
        dos2unix $GITHUB_WORKSPACE/$DIY_P1_SH
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        cd lede
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd lede && ./scripts/feeds update -a

    - name: Install feeds
      run: cd lede && ./scripts/feeds install -a

    - name: Load custom configuration & DIY Part 2
      run: |
        [ -e "$CONFIG_FILE" ] && cp "$CONFIG_FILE" lede/.config
        dos2unix $GITHUB_WORKSPACE/$DIY_P2_SH
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        cd lede
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Generate final configuration
      run: |
        cd lede
        make defconfig || { echo "❌ make defconfig 失败"; exit 1; }
        echo "=== 验证目标设备 ==="
        grep "CONFIG_TARGET_ar71xx_generic_DEVICE_netgear_wndr3800" .config || {
          echo "❌ 错误：设备 netgear_wndr3800 未启用"
          exit 1
        }
        echo "==================="

    - name: Download package
      run: |
        cd lede
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd lede
        make -j1 V=s

    - name: Organize files
      run: |
        mkdir -p firmware
        find lede/bin/targets/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.gz" \) -exec cp {} firmware/ \;
        echo "FIRMWARE_PATH=$PWD/firmware" >> $GITHUB_ENV

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: WNDR3800_4.14_Firmware_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}/*
