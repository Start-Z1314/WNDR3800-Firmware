name: Build WNDR3800 Performance Firmware

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-22.03
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  # 鑴氭湰璺緞宸茶皟鏁翠负浠撳簱鏍圭洰褰?  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Check Files
      run: |
        echo "Current directory: $PWD"
        ls -R

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "DEVICE_NAME=WNDR3800" >> $GITHUB_ENV

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH lede
        ln -sf /workdir/lede $GITHUB_WORKSPACE/lede

    - name: Load custom feeds
      run: |
        echo "Current workspace: $GITHUB_WORKSPACE"
        echo "DIY_P1_SH path: $GITHUB_WORKSPACE/$DIY_P1_SH"
        [ -e "$FEEDS_CONF" ] && cp "$FEEDS_CONF" lede/feeds.conf.default
        if [ -f "$GITHUB_WORKSPACE/$DIY_P1_SH" ]; then
          chmod +x "$GITHUB_WORKSPACE/$DIY_P1_SH"
          cd lede
          bash "$GITHUB_WORKSPACE/$DIY_P1_SH"
        else
          echo "Warning: $DIY_P1_SH not found, skipping"
        fi

    - name: Update feeds
      run: cd lede && ./scripts/feeds update -a

    - name: Install feeds
      run: cd lede && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e "$CONFIG_FILE" ] && cp "$CONFIG_FILE" lede/.config
        if [ -f "$GITHUB_WORKSPACE/$DIY_P2_SH" ]; then
          chmod +x "$GITHUB_WORKSPACE/$DIY_P2_SH"
          cd lede
          bash "$GITHUB_WORKSPACE/$DIY_P2_SH"
        else
          echo "Error: $DIY_P2_SH not found"
          exit 1
        fi

    - name: Generate Configuration
      run: |
        cd lede
        # 寮哄埗娓呯悊骞堕攣瀹?WNDR3800 鏋舵瀯
        sed -i 's/CONFIG_TARGET_ath79=.*/CONFIG_TARGET_ath79=y/' .config
        sed -i 's/CONFIG_TARGET_ath79_generic=.*/CONFIG_TARGET_ath79_generic=y/' .config
        sed -i 's/CONFIG_TARGET_ath79_generic_DEVICE_netgear_wndr3800=.*/CONFIG_TARGET_ath79_generic_DEVICE_netgear_wndr3800=y/' .config
        
        # 棰勮繍琛屼竴娆?defconfig 閿佸畾鏋舵瀯渚濊禆
        make defconfig
        
        # 鏂规 A锛氭渶澶хǔ瀹氭€?- 閿佸畾鍐呮牳 4.14
        sed -i 's/CONFIG_LINUX_KERNEL_VERSION=.*/CONFIG_LINUX_KERNEL_VERSION="4.14"/' .config
        
        # 鎬ц兘鍘嬫Θ锛氬叏灞€浼樺寲璁剧疆
        sed -i 's/# CONFIG_STRIP_KERNEL_EXPORTS is not set/CONFIG_STRIP_KERNEL_EXPORTS=y/' .config
        sed -i 's/# CONFIG_USE_MKLIBS is not set/CONFIG_USE_MKLIBS=y/' .config
        sed -i 's/CONFIG_COLLECT_KERNEL_DEBUG=y/# CONFIG_COLLECT_KERNEL_DEBUG is not set/' .config
        # 寮€鍚?UPX 鍘嬬缉 (16MB Flash 鏈哄瀷蹇呴』锛屽噺灏忎簩杩涘埗鏂囦欢浣撶Н)
        sed -i 's/# CONFIG_USE_UPX is not set/CONFIG_USE_UPX=y/' .config
        
        # 鍐呭瓨鏁戞槦锛氬交搴曠鐢?IPv6
        sed -i 's/CONFIG_IPV6=y/# CONFIG_IPV6 is not set/' .config
        sed -i 's/CONFIG_PACKAGE_dnsmasq_full_dhcpv6=y/# CONFIG_PACKAGE_dnsmasq_full_dhcpv6 is not set/' .config
        sed -i 's/CONFIG_PACKAGE_ipv6helper=y/# CONFIG_PACKAGE_ipv6helper is not set/' .config
        
        # 鏂规 A锛氭渶澶хǔ瀹氭€?+ SSR Plus 鍚敤 (浠ｇ悊鏀寔)
        sed -i 's/# CONFIG_PACKAGE_luci-app-ssr-plus is not set/CONFIG_PACKAGE_luci-app-ssr-plus=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks is not set/CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_V2ray is not set/CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_V2ray=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Trojan is not set/CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Trojan=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Redsocks2 is not set/CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Redsocks2=y/' .config
        
        # 鏍稿績鍔熻兘锛歍urbo ACC (SFE鍔犻€? - 鏂规 A 淇濇寔鍚敤浣嗙鐢?BBR
        # WNDR3800 (ath79) 纭欢涓嶆敮鎸?Flow Offloading锛屽繀椤诲己鍒朵娇鐢?SFE 浠ラ伩鍏嶅啿绐?        sed -i 's/# CONFIG_PACKAGE_luci-app-turbo-acc is not set/CONFIG_PACKAGE_luci-app-turbo-acc=y/' .config
        sed -i 's/CONFIG_PACKAGE_luci-app-turbo-acc_INCLUDE_OFFLOADING=y/# CONFIG_PACKAGE_luci-app-turbo-acc_INCLUDE_OFFLOADING is not set/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-turbo-acc_INCLUDE_SHORTCUT_FE is not set/CONFIG_PACKAGE_luci-app-turbo-acc_INCLUDE_SHORTCUT_FE=y/' .config
        sed -i 's/CONFIG_PACKAGE_luci-app-turbo-acc_INCLUDE_BBR_CCA=y/# CONFIG_PACKAGE_luci-app-turbo-acc_INCLUDE_BBR_CCA is not set/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-turbo-acc_INCLUDE_DNSCACHE is not set/CONFIG_PACKAGE_luci-app-turbo-acc_INCLUDE_DNSCACHE=y/' .config
        
        # 鏍稿績鍔熻兘锛氳交閲?QoS (鐭冲儚楝兼牳蹇?
        sed -i 's/# CONFIG_PACKAGE_luci-app-eqos is not set/CONFIG_PACKAGE_luci-app-eqos=y/' .config
        
        # 鏋佽嚧绮剧畝锛氳В鍐宠蒋浠跺寘鍐茬獊 (CRITICAL FIX)
        # 1. 瑙ｅ喅 vsftpd 鍐茬獊锛氱鐢?vsftpd-alt锛屼娇鐢ㄦ爣鍑?vsftpd
        echo "CONFIG_PACKAGE_vsftpd-alt=n" >> .config
        echo "CONFIG_PACKAGE_luci-app-vsftpd=y" >> .config
        
        # 2. 瑙ｅ喅 Samba 鍐茬獊锛氱鐢?autosamba锛屼娇鐢?luci-app-samba4
        echo "CONFIG_PACKAGE_autosamba=n" >> .config
        echo "CONFIG_PACKAGE_luci-app-samba4=y" >> .config
        
        # 3. 瑙ｅ喅 TurboACC 鍐茬獊锛氱鐢?luci-app-turboacc (鏃犳í鏉犵増)锛屼娇鐢?luci-app-turbo-acc (鏈夋í鏉犵増)
        echo "CONFIG_PACKAGE_luci-app-turboacc=n" >> .config
        echo "CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING=n" >> .config
        echo "CONFIG_PACKAGE_luci-app-turbo-acc=y" >> .config

        # 绉婚櫎 ppp-multilink 绛夎€佹棫鍗忚浠ヨ妭鐪佸唴鏍稿唴瀛?        sed -i 's/CONFIG_PPP_MULTILINK=y/# CONFIG_PPP_MULTILINK is not set/' .config

        # Enable desired packages using sed to ensure proper configuration
        sed -i 's/# CONFIG_PACKAGE_luci-app-access-control is not set/CONFIG_PACKAGE_luci-app-access-control=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-wol is not set/CONFIG_PACKAGE_luci-app-wol=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-nlbwmon is not set/CONFIG_PACKAGE_luci-app-nlbwmon=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-autoreboot is not set/CONFIG_PACKAGE_luci-app-autoreboot=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-filetransfer is not set/CONFIG_PACKAGE_luci-app-filetransfer=y/' .config
        
        # Ensure Samba4 and vsftpd are enabled correctly
        sed -i 's/# CONFIG_PACKAGE_luci-app-samba4 is not set/CONFIG_PACKAGE_luci-app-samba4=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-vsftpd is not set/CONFIG_PACKAGE_luci-app-vsftpd=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-turbo-acc is not set/CONFIG_PACKAGE_luci-app-turbo-acc=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-aria2 is not set/CONFIG_PACKAGE_luci-app-aria2=y/' .config
        sed -i 's/# CONFIG_PACKAGE_block-mount is not set/CONFIG_PACKAGE_block-mount=y/' .config
        
        # Interface: Use the most modern, universally compatible Argon theme
        sed -i 's/# CONFIG_PACKAGE_luci-theme-argon is not set/CONFIG_PACKAGE_luci-theme-argon=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-argon-config is not set/CONFIG_PACKAGE_luci-app-argon-config=y/' .config
        sed -i 's/CONFIG_PACKAGE_luci-theme-bootstrap=y/# CONFIG_PACKAGE_luci-theme-bootstrap is not set/' .config
        sed -i 's/CONFIG_PACKAGE_luci-theme-edge=y/# CONFIG_PACKAGE_luci-theme-edge is not set/' .config

        # 纭欢椹卞姩鍖归厤锛歐NDR3800 涓撶敤鏃犵嚎椹卞姩 (ath9k)
        sed -i 's/# CONFIG_PACKAGE_kmod-ath9k is not set/CONFIG_PACKAGE_kmod-ath9k=y/' .config
        sed -i 's/# CONFIG_ATH9K_SUPPORT_PCOEM is not set/CONFIG_ATH9K_SUPPORT_PCOEM=y/' .config
        sed -i 's/CONFIG_PACKAGE_ath9k-htc-firmware=y/# CONFIG_PACKAGE_ath9k-htc-firmware is not set/' .config

        # 鏋佽嚧绮剧畝锛氱Щ闄や笉蹇呰鐨勫唴鏍歌皟璇曞拰鍐椾綑椹卞姩
        sed -i 's/# CONFIG_KERNEL_GZIP is not set/CONFIG_KERNEL_GZIP=y/' .config
        sed -i 's/CONFIG_KERNEL_KALLSYMS=y/# CONFIG_KERNEL_KALLSYMS is not set/' .config
        sed -i 's/CONFIG_KERNEL_DEBUG_KERNEL=y/# CONFIG_KERNEL_DEBUG_KERNEL is not set/' .config

        # 浜ゆ崲鏈鸿姱鐗囬┍鍔細WNDR3800 纭欢淇 (RTL8366SR)
        sed -i 's/# CONFIG_PACKAGE_kmod-swconfig is not set/CONFIG_PACKAGE_kmod-swconfig=y/' .config
        sed -i 's/# CONFIG_PACKAGE_kmod-switch-rtl8366sr is not set/CONFIG_PACKAGE_kmod-switch-rtl8366sr=y/' .config
        sed -i 's/# CONFIG_PACKAGE_kmod-switch-rtl8366_smi is not set/CONFIG_PACKAGE_kmod-switch-rtl8366_smi=y/' .config

        # 瀛樺偍涓?NAS 鍏变韩 (閰嶅悎 Aria2 鎵撻€犺交閲忎笅杞芥満)
        # 鍖呭惈蹇呰鐨?USB 2.0 椹卞姩鍜屾枃浠剁郴缁熸敮鎸?        sed -i 's/# CONFIG_PACKAGE_kmod-usb-ohci is not set/CONFIG_PACKAGE_kmod-usb-ohci=y/' .config
        sed -i 's/# CONFIG_PACKAGE_kmod-usb2 is not set/CONFIG_PACKAGE_kmod-usb2=y/' .config
        sed -i 's/# CONFIG_PACKAGE_kmod-usb-storage is not set/CONFIG_PACKAGE_kmod-usb-storage=y/' .config
        sed -i 's/# CONFIG_PACKAGE_kmod-fs-ext4 is not set/CONFIG_PACKAGE_kmod-fs-ext4=y/' .config
        sed -i 's/# CONFIG_PACKAGE_kmod-fs-vfat is not set/CONFIG_PACKAGE_kmod-fs-vfat=y/' .config
        sed -i 's/# CONFIG_PACKAGE_kmod-nls-utf8 is not set/CONFIG_PACKAGE_kmod-nls-utf8=y/' .config
        sed -i 's/# CONFIG_PACKAGE_kmod-nls-cp437 is not set/CONFIG_PACKAGE_kmod-nls-cp437=y/' .config
        
        # NAS 鏍稿績缁勪欢锛歋amba4 + FTP + 鑷姩鎸傝浇
        sed -i 's/# CONFIG_PACKAGE_luci-app-aria2 is not set/CONFIG_PACKAGE_luci-app-aria2=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-samba4 is not set/CONFIG_PACKAGE_luci-app-samba4=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-vsftpd is not set/CONFIG_PACKAGE_luci-app-vsftpd=y/' .config
        sed -i 's/# CONFIG_PACKAGE_block-mount is not set/CONFIG_PACKAGE_block-mount=y/' .config
        
        # 鏋佽嚧鎬ц兘浼樺寲锛歾RAM 铏氭嫙鍐呭瓨 + CPU 棰戠巼璋冭妭
        sed -i 's/# CONFIG_PACKAGE_zram-swap is not set/CONFIG_PACKAGE_zram-swap=y/' .config
        sed -i 's/# CONFIG_PACKAGE_luci-app-cpufreq is not set/CONFIG_PACKAGE_luci-app-cpufreq=y/' .config
        
        make defconfig

    - name: Download package
      id: package
      run: |
        cd lede
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd lede
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: lede/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        mkdir -p firmware
        # 浣跨敤鏇寸ǔ鍋ョ殑鏌ユ壘鏂瑰紡锛岀‘淇濆湪缂栬瘧澶辫触鏃朵笉浼氭姤閿欙紝骞惰兘姝ｇ‘澶勭悊杞摼鎺?        if [ -d lede/bin/targets/ ]; then
          find lede/bin/targets/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.tar.gz" \) -exec cp {} ./firmware/ \;
        fi
        if [ -d ./firmware ] && [ "$(ls -A ./firmware/)" ]; then
          echo "FIRMWARE=$GITHUB_WORKSPACE/firmware" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "No firmware found"
          echo "status=fail" >> $GITHUB_OUTPUT
        fi

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
