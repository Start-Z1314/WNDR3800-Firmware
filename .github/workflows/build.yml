name: Build WNDR3800 Lean 4.14 Firmware

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204) dos2unix
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH lede
        ln -sf /workdir/lede $GITHUB_WORKSPACE/lede

    - name: Cache build directories
      uses: actions/cache@v4
      env:
        cache-name: cache-wndr3800-dl-build
      with:
        path: |
          /workdir/lede/dl
          /workdir/lede/build_dir
          /workdir/lede/staging_dir
          /workdir/lede/tmp
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/download.pl', '**/Makefile') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-

    - name: Load custom feeds
      run: |
        [ -e "$FEEDS_CONF" ] && cp "$FEEDS_CONF" lede/feeds.conf.default
        dos2unix $GITHUB_WORKSPACE/$DIY_P1_SH
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        cd lede
        $GITHUB_WORKSPACE/$DIY_P1_SH
        rm -f target/linux/ath79/config-5.*
        rm -f target/linux/ath79/config-6.*

    - name: Update feeds
      run: cd lede && ./scripts/feeds update -a

    - name: Install feeds
      run: cd lede && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e "$CONFIG_FILE" ] && cp "$CONFIG_FILE" lede/.config
        dos2unix $GITHUB_WORKSPACE/$DIY_P2_SH
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        cd lede
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Generate Configuration
      run: |
        cd lede
        
        # 1. 直接创建完整的 seed 配置文件
        cat > .config <<EOF
CONFIG_TARGET_ath79=y
CONFIG_TARGET_ath79_generic=y
CONFIG_TARGET_ath79_generic_DEVICE_netgear_wndr3800=y
CONFIG_LINUX_KERNEL_VERSION="4.14"
CONFIG_USE_UPX=y
CONFIG_STRIP_KERNEL_EXPORTS=y
CONFIG_USE_MKLIBS=y
# CONFIG_IPV6 is not set
CONFIG_PACKAGE_luci-app-ssr-plus=y
CONFIG_PACKAGE_luci-app-turbo-acc=y
CONFIG_PACKAGE_luci-app-turbo-acc_INCLUDE_SHORTCUT_FE=y
CONFIG_PACKAGE_luci-app-cpufreq=y
CONFIG_PACKAGE_luci-app-zram=y
CONFIG_PACKAGE_luci-app-vsftpd=y
CONFIG_PACKAGE_luci-app-gargoyle-qos=y
CONFIG_PACKAGE_luci-theme-argon=y
CONFIG_PACKAGE_kmod-switch-rtl8366s=y
CONFIG_PACKAGE_kmod-of-mdio=y
CONFIG_PACKAGE_kmod-usb-ohci=y
CONFIG_PACKAGE_kmod-usb2=y
CONFIG_PACKAGE_kmod-usb-storage=y
CONFIG_PACKAGE_kmod-fs-ext4=y
CONFIG_PACKAGE_kmod-fs-vfat=y
CONFIG_PACKAGE_kmod-nls-utf8=y
CONFIG_PACKAGE_block-mount=y
EOF

        # 2. 运行 defconfig 来解析依赖
        make defconfig || { echo "❌ make defconfig 失败"; exit 1; }

        # 3. 验证设备是否被正确选中
        echo "🔍 验证当前设备配置："
        grep "CONFIG_TARGET_ath79_generic_DEVICE_netgear_wndr3800" .config || {
          echo "❌ 错误：设备 netgear_wndr3800 未在 .config 中启用"
          echo "当前 TARGET 相关配置："
          grep "CONFIG_TARGET" .config
          exit 1
        }

        # 4. 强制锁定内核版本
        sed -i 's/CONFIG_LINUX_KERNEL_VERSION=.*/CONFIG_LINUX_KERNEL_VERSION="4.14"/g' .config
        echo "CONFIG_LINUX_KERNEL_VERSION=\"4.14\"" >> .config

        # 5. 精简语言包
        sed -i 's/luci-i18n-.*-zh-cn/luci-i18n-base-zh-cn/g' .config

        # 6. 最终验证并保存配置
        echo "===== 最终目标设备 ====="
        grep "CONFIG_TARGET_ath79_generic_DEVICE_netgear_wndr3800" .config
        grep "CONFIG_TARGET_BOARD" .config
        grep "CONFIG_TARGET_ARCH_PACKAGES" .config
        echo "======================="

        cp .config $GITHUB_WORKSPACE/final.config

    - name: Upload final .config for debugging
      uses: actions/upload-artifact@main
      with:
        name: final_config_${{ env.FILE_DATE }}
        path: final.config

    - name: Download package
      run: |
        cd lede
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd lede
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Organize files
      id: organize
      run: |
        mkdir -p firmware
        find lede/bin/targets/ -type f \( -name "*.bin" -o -name "*.img" \) -exec cp {} ./firmware/ \;
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success'
      with:
        name: WNDR3800_Lean_4.14_${{ env.FILE_DATE }}
        path: ./firmware/*
